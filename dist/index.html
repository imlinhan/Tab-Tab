<!DOCTYPE html>
<html lang="en" data-theme="light" data-skin="glass" data-motion="smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab-Tab</title>
  <script type="module" crossorigin src="./assets/newtab-DrJQOGdO.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/newtab-BxqIvTZt.css">
</head>
<body>

<div class="bg-gradient"></div>

<div class="container">

  <!-- Header -->
  <header>
    <div class="header-main">
      <h1 id="greeting"></h1>
      <div class="date" id="dateDisplay"></div>
      <div class="clock full-only" id="clock"></div>
    </div>
    <div class="header-controls">
      <button class="icon-btn" id="themeToggle" title="Toggle theme"></button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Weather Widget (full mode) -->
  <div class="weather-widget full-only" id="weatherWidget">
    <span class="weather-icon" id="weatherIcon"></span>
    <span class="weather-temp" id="weatherTemp"></span>
    <span class="weather-desc" id="weatherDesc"></span>
  </div>

  <!-- Quick Links (full mode) -->
  <div class="quick-links-bar full-only" id="quickLinks"></div>

  <!-- Search Bar -->
  <div class="search-bar glass-card">
    <button class="search-engine-btn" id="searchEngine" title="Switch engine"></button>
    <input type="text" class="search-input" id="searchInput" placeholder="Search..." autocomplete="off" autofocus>
  </div>

  <!-- Duplicate TabTab Banner -->
  <div class="dup-banner glass-card" id="tabTabDupeBanner" style="display:none">
    <div class="dup-banner-text">
      <strong id="tabTabDupeCount"></strong> copies of Tab-Tab are open. Keep only this one?
    </div>
    <button class="btn btn-accent" data-action="close-tabout-dups">Keep only this one</button>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboardColumns">

    <!-- Left: Open tabs -->
    <div class="main-section" id="openTabsSection" style="display:none">
      <div class="section-header">
        <h2>Open tabs</h2>
        <div class="section-line"></div>
        <div class="section-count" id="openTabsSectionCount"></div>
      </div>
      <div class="tab-filter full-only">
        <input type="text" class="tab-filter-input" id="tabFilterInput" placeholder="Filter tabs...">
      </div>
      <div class="card-grid" id="openTabsMissions"></div>
    </div>

    <!-- Right: Saved for later -->
    <div class="sidebar" id="deferredColumn" style="display:none">
      <div class="section-header">
        <h2>Saved for later</h2>
        <div class="section-line"></div>
        <div class="section-count" id="deferredCount"></div>
      </div>

      <div class="deferred-list" id="deferredList"></div>
      <div class="deferred-empty" id="deferredEmpty" style="display:none">
        Nothing saved yet.
      </div>

      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle">
          <svg class="archive-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          Archive
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input type="text" class="archive-search" id="archiveSearch" placeholder="Search archived tabs...">
          <div class="archive-list" id="archiveList"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Full Mode Widgets -->
  <div class="widgets-grid full-only">

    <!-- Quote -->
    <div class="widget glass-card widget-quote">
      <div class="widget-title">Daily Quote</div>
      <div id="quoteText" class="quote-text"></div>
      <div id="quoteAuthor" class="quote-author"></div>
    </div>

    <!-- Pomodoro -->
    <div class="widget glass-card widget-pomodoro">
      <div class="widget-title">Pomodoro</div>
      <div class="pomodoro-display">
        <span id="pomodoroLabel" class="pomodoro-label">Focus</span>
        <span id="pomodoroTime" class="pomodoro-time">25:00</span>
      </div>
      <div class="pomodoro-controls">
        <button class="btn btn-accent" id="pomodoroToggle">Start</button>
        <button class="btn" id="pomodoroReset">Reset</button>
      </div>
    </div>

    <!-- Todo -->
    <div class="widget glass-card widget-todo">
      <div class="widget-title">Tasks</div>
      <input type="text" class="todo-input" id="todoInput" placeholder="Add a task...">
      <div id="todoEmpty" class="todo-empty" style="display:none">No tasks yet.</div>
      <div id="todoList" class="todo-list"></div>
    </div>

    <!-- Notes -->
    <div class="widget glass-card widget-notes">
      <div class="widget-title">Quick Notes</div>
      <textarea class="notes-area" id="notesArea" placeholder="Jot down thoughts..."></textarea>
    </div>

    <!-- Stats -->
    <div class="widget glass-card widget-stats" id="statsWidget">
      <div class="widget-title">Tab Stats</div>
      <div class="stats-numbers">
        <div class="stats-item">
          <span class="stats-value" id="statsTotalClosed">0</span>
          <span class="stats-label">Closed</span>
        </div>
        <div class="stats-item">
          <span class="stats-value" id="statsTotalSaved">0</span>
          <span class="stats-label">Saved</span>
        </div>
      </div>
      <div class="stats-chart" id="statsChart"></div>
    </div>

    <!-- Screen Time -->
    <div class="widget glass-card widget-screentime" id="screenTimeWidget">
      <div class="widget-title">Screen Time</div>
      <div class="stats-numbers">
        <div class="stats-item">
          <span class="stats-value" id="screenTimeToday">0m</span>
          <span class="stats-label">Today</span>
        </div>
        <div class="stats-item">
          <span class="stats-value" id="screenTimeWeek">0m</span>
          <span class="stats-label">This week</span>
        </div>
      </div>
    </div>

    <!-- Hibernated tabs -->
    <div class="widget glass-card widget-hibernate">
      <div class="widget-title">Saved tabs</div>
      <div id="hibernateEmpty" class="todo-empty">No saved tab groups.</div>
      <div id="hibernateList"></div>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">&mdash;</div>
        <div class="stat-label">Open tabs</div>
      </div>
    </div>
    <div class="footer-brand">Tab-Tab</div>
  </footer>

</div>

<!-- Settings Panel -->
<div id="settingsOverlay"></div>
<div id="settingsPanel">
  <div class="settings-header">
    <h2>Settings</h2>
    <button class="settings-close" id="settingsClose">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="settings-body" id="settingsBody"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
  <span id="toastText"></span>
</div>

</body>
</html>
